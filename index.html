<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인생네컷 카메라</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
    background: #1a1a1a;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 500; margin: 8px 0 16px; }
  h2.section { font-size: 13px; color: #999; margin: 20px 0 8px; width: 100%; max-width: 420px; text-align: left; }

  .stage {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 3/4;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
  }
  video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  video.back { transform: scaleX(1); }
  .countdown {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; font-weight: 700;
    background: rgba(0,0,0,0.3);
    display: none;
  }
  .flash {
    position: absolute; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none;
  }
  .rec-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.6); color: #ff5050;
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    display: none; align-items: center; gap: 6px;
  }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff5050; }

  .controls {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    justify-content: center; width: 100%; max-width: 420px;
  }
  button, select, input[type=text] {
    background: #2a2a2a; color: #fff; border: 1px solid #444;
    border-radius: 8px; padding: 10px 16px; font-size: 14px;
  }
  input[type=text] { width: 100%; }
  button { cursor: pointer; }
  button.primary { background: #e0507a; border-color: #e0507a; font-weight: 500; }
  button.chip.active { background: #e0507a; border-color: #e0507a; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .frame-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 8px;
    width: 100%;
    max-width: 420px;
  }
  .frame-card {
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 8px 6px;
    cursor: pointer;
    text-align: center;
    background: #2a2a2a;
  }
  .frame-card.selected { border-color: #e0507a; }
  .frame-swatch {
    width: 100%;
    height: 40px;
    border-radius: 6px;
    margin-bottom: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .frame-name { font-size: 12px; color: #ddd; }

  .mode-row { display: flex; gap: 6px; width: 100%; max-width: 420px; margin-top: 14px; }
  .mode-btn {
    flex: 1; padding: 10px 4px; font-size: 13px; text-align: center;
    background: #2a2a2a; border: 2px solid transparent; border-radius: 8px; cursor: pointer;
  }
  .mode-btn.active { border-color: #e0507a; background: #3a2028; }

  .sticker-palette, .color-palette {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 420px; margin-top: 10px;
  }
  .sticker-btn {
    font-size: 22px; padding: 8px 10px; background: #2a2a2a;
    border: 2px solid transparent; border-radius: 8px; cursor: pointer;
  }
  .sticker-btn.armed { border-color: #e0507a; background: #3a2028; }
  .color-btn {
    width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer;
  }
  .color-btn.selected { border-color: #fff; }

  .select-wrap { width: 100%; max-width: 420px; margin-top: 16px; }
  .thumb-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .thumb-card {
    position: relative; border-radius: 8px; overflow: hidden; cursor: pointer;
    border: 3px solid transparent; aspect-ratio: 3/4;
  }
  .thumb-card.picked { border-color: #e0507a; }
  .thumb-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-badge {
    position: absolute; top: 4px; right: 4px;
    background: #e0507a; color: #fff; font-size: 12px; font-weight: 600;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .video-wrap { width: 100%; max-width: 420px; margin-top: 16px; text-align: center; }
  .video-wrap video { width: 100%; border-radius: 8px; background: #000; }

  .result-wrap { margin-top: 16px; text-align: center; width: 100%; max-width: 420px; }
  canvas { max-width: 100%; border-radius: 8px; touch-action: manipulation; display: block; margin: 0 auto; }
  .hint { font-size: 12px; color: #999; margin-top: 6px; }
  .status { font-size: 13px; color: #aaa; margin-top: 8px; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<h1>인생네컷 카메라</h1>

<h2 class="section">1. 프레임 선택 (나중에도 바꿀 수 있어요)</h2>
<div class="frame-grid" id="frameGrid"></div>

<h2 class="section">2. 레이아웃 (방향) 선택 (나중에도 바꿀 수 있어요)</h2>
<div class="controls">
  <button class="chip" data-layout="strip-v">세로 스트립</button>
  <button class="chip" data-layout="grid">격자 2x2</button>
  <button class="chip" data-layout="strip-h">가로 스트립</button>
</div>

<h2 class="section">3. 하단 문구 (선택)</h2>
<input type="text" id="titleInput" placeholder="프레임에 들어갈 문구를 입력하세요">

<h2 class="section">4. 촬영 (8장 찍고 그중 4장을 고르게 돼요)</h2>
<div class="stage">
  <video id="video" autoplay playsinline muted></video>
  <div class="countdown" id="countdown"></div>
  <div class="flash" id="flash"></div>
  <div class="rec-badge" id="recBadge"><span class="rec-dot"></span>REC</div>
</div>

<div class="controls">
  <select id="filterSelect">
    <option value="none">필터 없음</option>
    <option value="grayscale(100%)">흑백</option>
    <option value="sepia(70%)">세피아</option>
    <option value="brightness(1.15) contrast(1.05)">화사하게</option>
    <option value="contrast(1.2) saturate(1.3)">비비드</option>
  </select>
  <button id="flipBtn">카메라 전환</button>
</div>

<div class="controls">
  <button id="startBtn" class="primary">촬영 시작 (8컷)</button>
  <button id="resetBtn" disabled>다시 찍기</button>
</div>

<div class="status" id="status">카메라를 준비 중입니다...</div>

<div class="select-wrap" id="selectWrap" style="display:none;">
  <h2 class="section" style="margin-top:0;">마음에 드는 4장을 골라주세요 (<span id="pickCount">0</span>/4)</h2>
  <div class="thumb-grid" id="thumbGrid"></div>
  <div class="controls">
    <button id="confirmPickBtn" class="primary" disabled>이 4장으로 완성하기</button>
  </div>
</div>

<div class="video-wrap" id="videoWrap" style="display:none;">
  <h2 class="section" style="margin-top:0;">촬영 과정 영상</h2>
  <video id="sessionVideo" controls playsinline></video>
  <div class="controls">
    <button id="downloadVideoBtn">촬영 영상 다운로드</button>
  </div>
</div>

<div class="result-wrap" id="resultWrap" style="display:none;">
  <canvas id="finalCanvas"></canvas>

  <div class="mode-row">
    <div class="mode-btn active" data-mode="sticker">🖼️ 스티커</div>
    <div class="mode-btn" data-mode="text">🔤 글자 입력</div>
    <div class="mode-btn" data-mode="draw">✏️ 손글씨</div>
  </div>

  <div id="stickerControls">
    <div class="hint">스티커를 고른 다음, 사진 위를 톡톡 눌러보세요</div>
    <div class="sticker-palette" id="stickerPalette"></div>
  </div>

  <div id="textControls" style="display:none;">
    <div class="hint">글자를 입력하고, 사진 위 원하는 자리를 눌러보세요</div>
    <input type="text" id="freeTextInput" placeholder="예: 생일 축하해!" style="margin-top:8px;">
    <div class="color-palette" id="textColorPalette"></div>
  </div>

  <div id="drawControls" style="display:none;">
    <div class="hint">손가락으로 사진 위에 바로 그려보세요</div>
    <div class="color-palette" id="drawColorPalette"></div>
  </div>

  <div class="controls">
    <button id="undoBtn">되돌리기</button>
    <button id="clearBtn">전체 지우기</button>
  </div>
  <div class="controls">
    <button id="downloadBtn" class="primary">이미지 다운로드</button>
  </div>
</div>

<script>
/* ============================================================
   프레임 정의 — 배열에 객체만 추가하면 새 프레임이 생깁니다.
   ============================================================ */
const FRAMES = [
  {
    id: 'pastel-pink', name: '핑크 인생네컷', bg: '#fdf0f4', accent: '#e0507a',
    title: '2026 우리의 순간',
    stickers: [
      { emoji: '🎀', x: 0.10, y: 0.045, size: 34 },
      { emoji: '✨', x: 0.88, y: 0.05, size: 28 },
      { emoji: '💕', x: 0.90, y: 0.94, size: 30 }
    ]
  },
  {
    id: 'pastel-blue', name: '블루 인생네컷', bg: '#eef5fb', accent: '#3d7ea6',
    title: 'FRIENDS FOREVER',
    stickers: [
      { emoji: '⭐', x: 0.10, y: 0.045, size: 30 },
      { emoji: '☁️', x: 0.86, y: 0.05, size: 32 },
      { emoji: '💙', x: 0.10, y: 0.94, size: 28 }
    ]
  },
  {
    id: 'mono', name: '모노톤', bg: '#ffffff', accent: '#222222',
    title: 'LIFE 4 CUT',
    stickers: []
  },
  {
    id: 'summer-bible', name: '여름성경학교', bg: '#fff8e6', accent: '#c9862a',
    title: '여름성경학교 2026',
    stickers: [
      { emoji: '✝️', x: 0.10, y: 0.045, size: 32 },
      { emoji: '⛺', x: 0.86, y: 0.05, size: 30 },
      { emoji: '🌟', x: 0.10, y: 0.94, size: 26 },
      { emoji: '📖', x: 0.88, y: 0.94, size: 28 }
    ]
  }
  /* 새 프레임 추가 예시:
  {
    id: 'my-new-frame', name: '새 프레임 이름', bg: '#색상코드', accent: '#포인트색상',
    title: '기본 문구',
    stickers: [ { emoji: '🎈', x: 0.1, y: 0.05, size: 30 } ]
  },
  */
];

const STICKER_PALETTE = ['❤️', '⭐', '🎉', '🌸', '😂', '👍', '✨', '🎈', '🐰', '🌈'];
const COLOR_PALETTE = ['#222222', '#e0507a', '#3d7ea6', '#c9862a', '#3a9e5f', '#ffffff'];
const TOTAL_SHOTS = 8;
const PICK_COUNT = 4;

let selectedFrame = FRAMES[0];
let selectedLayout = 'strip-v';
let decorations = [];

let currentMode = 'sticker';
let armedSticker = null;
let textColor = COLOR_PALETTE[0];
let drawColor = COLOR_PALETTE[0];

let isDrawing = false;
let activeStroke = null;

let mediaRecorder = null;
let recordedChunks = [];
let recordedMimeType = '';

window.onerror = function(msg, url, line) {
  document.getElementById('status').textContent = '오류 발생: ' + msg + ' (line ' + line + ')';
  document.getElementById('status').style.color = '#ff8080';
  return false;
};

const video = document.getElementById('video');
const countdownEl = document.getElementById('countdown');
const flashEl = document.getElementById('flash');
const recBadge = document.getElementById('recBadge');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const flipBtn = document.getElementById('flipBtn');
const filterSelect = document.getElementById('filterSelect');
const titleInput = document.getElementById('titleInput');
const statusEl = document.getElementById('status');
const selectWrap = document.getElementById('selectWrap');
const thumbGrid = document.getElementById('thumbGrid');
const pickCountEl = document.getElementById('pickCount');
const confirmPickBtn = document.getElementById('confirmPickBtn');
const videoWrap = document.getElementById('videoWrap');
const sessionVideo = document.getElementById('sessionVideo');
const downloadVideoBtn = document.getElementById('downloadVideoBtn');
const resultWrap = document.getElementById('resultWrap');
const finalCanvas = document.getElementById('finalCanvas');
const downloadBtn = document.getElementById('downloadBtn');
const frameGrid = document.getElementById('frameGrid');
const stickerPalette = document.getElementById('stickerPalette');
const textColorPalette = document.getElementById('textColorPalette');
const drawColorPalette = document.getElementById('drawColorPalette');
const freeTextInput = document.getElementById('freeTextInput');
const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const layoutChips = document.querySelectorAll('.chip[data-layout]');
const modeButtons = document.querySelectorAll('.mode-btn');
const stickerControls = document.getElementById('stickerControls');
const textControls = document.getElementById('textControls');
const drawControls = document.getElementById('drawControls');

let currentStream = null;
let facingMode = 'user';
let allShots = [];       // 8장 전체
let selectedIdx = [];    // 고른 사진의 원래 인덱스
let shots = [];          // 최종 선택된 4장 (프레임 합성에 사용)

/* ---------- 프레임 선택 UI ---------- */
function renderFrameGrid() {
  frameGrid.innerHTML = '';
  FRAMES.forEach(frame => {
    const card = document.createElement('div');
    card.className = 'frame-card' + (frame.id === selectedFrame.id ? ' selected' : '');
    card.innerHTML = `
      <div class="frame-swatch" style="background:${frame.bg}; border:2px solid ${frame.accent};">
        ${frame.stickers[0] ? frame.stickers[0].emoji : '🖼️'}
      </div>
      <div class="frame-name">${frame.name}</div>
    `;
    card.addEventListener('click', () => {
      selectedFrame = frame;
      if (shots.length === 0) titleInput.placeholder = frame.title;
      renderFrameGrid();
      if (shots.length > 0) renderFinal();
    });
    frameGrid.appendChild(card);
  });
}
renderFrameGrid();
titleInput.placeholder = selectedFrame.title;
titleInput.addEventListener('input', () => { if (shots.length > 0) renderFinal(); });

/* ---------- 레이아웃 선택 UI ---------- */
function renderLayoutChips() {
  layoutChips.forEach(btn => btn.classList.toggle('active', btn.dataset.layout === selectedLayout));
}
layoutChips.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedLayout = btn.dataset.layout;
    renderLayoutChips();
    if (shots.length > 0) renderFinal();
  });
});
renderLayoutChips();

/* ---------- 꾸미기 모드 선택 ---------- */
function setMode(mode) {
  currentMode = mode;
  modeButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  stickerControls.style.display = mode === 'sticker' ? 'block' : 'none';
  textControls.style.display = mode === 'text' ? 'block' : 'none';
  drawControls.style.display = mode === 'draw' ? 'block' : 'none';
  finalCanvas.style.touchAction = mode === 'draw' ? 'none' : 'manipulation';
}
modeButtons.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

/* ---------- 스티커 팔레트 ---------- */
function renderStickerPalette() {
  stickerPalette.innerHTML = '';
  STICKER_PALETTE.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'sticker-btn' + (armedSticker === emoji ? ' armed' : '');
    btn.textContent = emoji;
    btn.addEventListener('click', () => {
      armedSticker = (armedSticker === emoji) ? null : emoji;
      renderStickerPalette();
    });
    stickerPalette.appendChild(btn);
  });
}
renderStickerPalette();

/* ---------- 색상 팔레트 ---------- */
function renderColorPalette(container, currentColor, onPick) {
  container.innerHTML = '';
  COLOR_PALETTE.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (currentColor === color ? ' selected' : '');
    btn.style.background = color;
    if (color === '#ffffff') btn.style.border = '2px solid #666';
    btn.addEventListener('click', () => onPick(color));
    container.appendChild(btn);
  });
}
function refreshColorPalettes() {
  renderColorPalette(textColorPalette, textColor, (c) => { textColor = c; refreshColorPalettes(); });
  renderColorPalette(drawColorPalette, drawColor, (c) => { drawColor = c; refreshColorPalettes(); });
}
refreshColorPalettes();

/* ---------- 캔버스에 탭해서 스티커/텍스트 배치 ---------- */
finalCanvas.addEventListener('click', (e) => {
  if (currentMode === 'draw') return;
  const rect = finalCanvas.getBoundingClientRect();
  const scaleX = finalCanvas.width / rect.width;
  const scaleY = finalCanvas.height / rect.height;
  const fx = ((e.clientX - rect.left) * scaleX) / finalCanvas.width;
  const fy = ((e.clientY - rect.top) * scaleY) / finalCanvas.height;

  if (currentMode === 'sticker') {
    if (!armedSticker) return;
    decorations.push({ type: 'sticker', emoji: armedSticker, x: fx, y: fy, size: 40 });
    renderFinal();
  } else if (currentMode === 'text') {
    const content = freeTextInput.value.trim();
    if (!content) return;
    decorations.push({ type: 'text', content, x: fx, y: fy, color: textColor, size: 26 });
    renderFinal();
  }
});

/* ---------- 손글씨 그리기 ---------- */
function getCanvasPoint(e) {
  const rect = finalCanvas.getBoundingClientRect();
  const scaleX = finalCanvas.width / rect.width;
  const scaleY = finalCanvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  return { x: px / finalCanvas.width, y: py / finalCanvas.height };
}
finalCanvas.addEventListener('pointerdown', (e) => {
  if (currentMode !== 'draw' || shots.length === 0) return;
  isDrawing = true;
  finalCanvas.setPointerCapture(e.pointerId);
  const p = getCanvasPoint(e);
  activeStroke = { type: 'stroke', color: drawColor, width: 4, points: [p] };
  decorations.push(activeStroke);
});
finalCanvas.addEventListener('pointermove', (e) => {
  if (!isDrawing || !activeStroke) return;
  const p = getCanvasPoint(e);
  const prev = activeStroke.points[activeStroke.points.length - 1];
  activeStroke.points.push(p);
  const ctx = finalCanvas.getContext('2d');
  ctx.strokeStyle = activeStroke.color;
  ctx.lineWidth = activeStroke.width;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(prev.x * finalCanvas.width, prev.y * finalCanvas.height);
  ctx.lineTo(p.x * finalCanvas.width, p.y * finalCanvas.height);
  ctx.stroke();
});
finalCanvas.addEventListener('pointerup', () => { isDrawing = false; activeStroke = null; });
finalCanvas.addEventListener('pointercancel', () => { isDrawing = false; activeStroke = null; });

undoBtn.addEventListener('click', () => { decorations.pop(); renderFinal(); });
clearBtn.addEventListener('click', () => { decorations = []; renderFinal(); });

/* ---------- 카메라 ---------- */
async function startCamera() {
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode },
      audio: false
    });
    video.srcObject = currentStream;
    video.classList.toggle('back', facingMode === 'environment');
    statusEl.textContent = '준비 완료! 촬영 시작을 눌러주세요.';
    statusEl.style.color = '#aaa';
  } catch (err) {
    statusEl.textContent = '카메라 접근 실패: ' + err.message + ' (카메라 권한을 허용해주세요)';
    statusEl.style.color = '#ff8080';
  }
}
flipBtn.addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function countdown(seconds) {
  countdownEl.style.display = 'flex';
  for (let i = seconds; i > 0; i--) {
    countdownEl.textContent = i;
    await sleep(1000);
  }
  countdownEl.style.display = 'none';
}

function flash() {
  flashEl.style.transition = 'none';
  flashEl.style.opacity = '0.8';
  requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.3s';
    flashEl.style.opacity = '0';
  });
}

function capturePhoto() {
  const canvas = document.createElement('canvas');
  const w = video.videoWidth || 720, h = video.videoHeight || 960;
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  try {
    if ('filter' in ctx) ctx.filter = filterSelect.value;
  } catch (e) { /* unsupported, skip */ }
  if (facingMode === 'user') {
    ctx.translate(w, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0, w, h);
  return canvas;
}

/* ---------- 촬영 과정 영상 녹화 ---------- */
function pickSupportedMimeType() {
  if (typeof MediaRecorder === 'undefined') return null;
  const candidates = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
  for (const type of candidates) {
    if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(type)) return type;
  }
  return null;
}

function startRecording() {
  recordedChunks = [];
  recordedMimeType = pickSupportedMimeType();
  if (!recordedMimeType || !currentStream) {
    mediaRecorder = null;
    return;
  }
  try {
    mediaRecorder = new MediaRecorder(currentStream, { mimeType: recordedMimeType });
    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.start();
    recBadge.style.display = 'flex';
  } catch (err) {
    mediaRecorder = null;
  }
}

function stopRecording() {
  return new Promise((resolve) => {
    recBadge.style.display = 'none';
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
      resolve(null);
      return;
    }
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: recordedMimeType });
      resolve(URL.createObjectURL(blob));
    };
    mediaRecorder.stop();
  });
}

/* ---------- 8장 촬영 ---------- */
async function runSequence() {
  try {
    allShots = [];
    selectedIdx = [];
    shots = [];
    decorations = [];
    armedSticker = null;
    renderStickerPalette();
    setMode('sticker');
    selectWrap.style.display = 'none';
    videoWrap.style.display = 'none';
    resultWrap.style.display = 'none';

    startBtn.disabled = true;
    resetBtn.disabled = true;
    flipBtn.disabled = true;
    filterSelect.disabled = true;

    startRecording();

    for (let i = 0; i < TOTAL_SHOTS; i++) {
      statusEl.textContent = `${i + 1}/${TOTAL_SHOTS}번째 사진 촬영 준비...`;
      await countdown(3);
      flash();
      const shot = capturePhoto();
      allShots.push(shot);
      statusEl.textContent = `${i + 1}/${TOTAL_SHOTS}번째 사진 완료!`;
      await sleep(400);
    }

    statusEl.textContent = '영상 저장 중...';
    const videoUrl = await stopRecording();
    if (videoUrl) {
      sessionVideo.src = videoUrl;
      downloadVideoBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'life4cut_video_' + Date.now() + (recordedMimeType.includes('mp4') ? '.mp4' : '.webm');
        link.href = videoUrl;
        link.click();
      };
      videoWrap.style.display = 'block';
    } else {
      videoWrap.style.display = 'none';
    }

    renderThumbGrid();
    selectWrap.style.display = 'block';
    selectWrap.scrollIntoView({ behavior: 'smooth' });
    statusEl.textContent = `${TOTAL_SHOTS}장 촬영 완료! 마음에 드는 ${PICK_COUNT}장을 골라주세요.`;
    statusEl.style.color = '#aaa';
  } catch (err) {
    statusEl.textContent = '촬영 중 오류: ' + err.message;
    statusEl.style.color = '#ff8080';
  } finally {
    startBtn.disabled = false;
    resetBtn.disabled = false;
    flipBtn.disabled = false;
    filterSelect.disabled = false;
  }
}

/* ---------- 8장 중 4장 선택 UI ---------- */
function renderThumbGrid() {
  thumbGrid.innerHTML = '';
  allShots.forEach((shotCanvas, idx) => {
    const card = document.createElement('div');
    card.className = 'thumb-card' + (selectedIdx.includes(idx) ? ' picked' : '');
    const img = document.createElement('img');
    img.src = shotCanvas.toDataURL('image/jpeg', 0.8);
    card.appendChild(img);
    const order = selectedIdx.indexOf(idx);
    if (order > -1) {
      const badge = document.createElement('div');
      badge.className = 'thumb-badge';
      badge.textContent = order + 1;
      card.appendChild(badge);
    }
    card.addEventListener('click', () => {
      const pos = selectedIdx.indexOf(idx);
      if (pos > -1) {
        selectedIdx.splice(pos, 1);
      } else {
        if (selectedIdx.length >= PICK_COUNT) return;
        selectedIdx.push(idx);
      }
      renderThumbGrid();
      pickCountEl.textContent = selectedIdx.length;
      confirmPickBtn.disabled = selectedIdx.length !== PICK_COUNT;
    });
    thumbGrid.appendChild(card);
  });
  pickCountEl.textContent = selectedIdx.length;
  confirmPickBtn.disabled = selectedIdx.length !== PICK_COUNT;
}

confirmPickBtn.addEventListener('click', () => {
  const ordered = selectedIdx.slice().sort((a, b) => a - b);
  shots = ordered.map(i => allShots[i]);
  selectWrap.style.display = 'none';
  renderFinal();
  resultWrap.style.display = 'block';
  resultWrap.scrollIntoView({ behavior: 'smooth' });
  statusEl.textContent = '완성! 프레임/레이아웃도 바꿔보고, 스티커·글자·손글씨로 꾸며보세요.';
  statusEl.style.color = '#aaa';
});

/* ---------- 레이아웃 계산 ---------- */
function computeLayout() {
  const aspect = shots[0].height / shots[0].width;
  const padding = 22;
  const gap = 10;
  const captionH = 66;
  let canvasW, canvasH, cells;

  if (selectedLayout === 'grid') {
    const cellW = 240;
    const cellH = Math.round(cellW * aspect);
    canvasW = padding * 2 + cellW * 2 + gap;
    canvasH = padding * 2 + cellH * 2 + gap + captionH;
    cells = [];
    for (let r = 0; r < 2; r++) {
      for (let c = 0; c < 2; c++) {
        cells.push({ x: padding + c * (cellW + gap), y: padding + r * (cellH + gap), w: cellW, h: cellH });
      }
    }
  } else if (selectedLayout === 'strip-h') {
    const cellH = 260;
    const cellW = Math.round(cellH / aspect);
    canvasW = padding * 2 + cellW * 4 + gap * 3;
    canvasH = padding * 2 + cellH + captionH;
    cells = [];
    for (let i = 0; i < 4; i++) {
      cells.push({ x: padding + i * (cellW + gap), y: padding, w: cellW, h: cellH });
    }
  } else {
    const photoW = 420;
    const photoH = Math.round(photoW * aspect);
    canvasW = padding * 2 + photoW;
    canvasH = padding * 2 + photoH * 4 + gap * 3 + captionH;
    cells = [];
    for (let i = 0; i < 4; i++) {
      cells.push({ x: padding, y: padding + i * (photoH + gap), w: photoW, h: photoH });
    }
  }
  return { canvasW, canvasH, cells };
}

function drawDecoration(ctx, d, canvasW, canvasH) {
  if (d.type === 'sticker') {
    ctx.font = d.size + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.emoji, d.x * canvasW, d.y * canvasH);
  } else if (d.type === 'text') {
    ctx.font = '600 ' + d.size + 'px sans-serif';
    ctx.fillStyle = d.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.content, d.x * canvasW, d.y * canvasH);
  } else if (d.type === 'stroke') {
    if (d.points.length < 2) return;
    ctx.strokeStyle = d.color;
    ctx.lineWidth = d.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(d.points[0].x * canvasW, d.points[0].y * canvasH);
    for (let i = 1; i < d.points.length; i++) {
      ctx.lineTo(d.points[i].x * canvasW, d.points[i].y * canvasH);
    }
    ctx.stroke();
  }
}

function renderFinal() {
  try {
    if (shots.length === 0) return;
    const { canvasW, canvasH, cells } = computeLayout();
    finalCanvas.width = canvasW;
    finalCanvas.height = canvasH;
    const ctx = finalCanvas.getContext('2d');

    ctx.fillStyle = selectedFrame.bg;
    ctx.fillRect(0, 0, canvasW, canvasH);

    shots.forEach((shot, i) => {
      const c = cells[i];
      ctx.drawImage(shot, c.x, c.y, c.w, c.h);
      ctx.strokeStyle = selectedFrame.accent;
      ctx.lineWidth = 2;
      ctx.strokeRect(c.x, c.y, c.w, c.h);
    });

    ctx.strokeStyle = selectedFrame.accent;
    ctx.lineWidth = 6;
    ctx.strokeRect(3, 3, canvasW - 6, canvasH - 6);

    const displayTitle = titleInput.value.trim() || selectedFrame.title;
    ctx.fillStyle = selectedFrame.accent;
    ctx.font = '500 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(displayTitle, canvasW / 2, canvasH - 32);

    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#999999';
    const dateStr = new Date().toLocaleDateString('ko-KR');
    ctx.fillText(dateStr, canvasW / 2, canvasH - 13);

    selectedFrame.stickers.forEach(s => drawDecoration(ctx, { type: 'sticker', ...s }, canvasW, canvasH));
    decorations.forEach(d => drawDecoration(ctx, d, canvasW, canvasH));
  } catch (err) {
    statusEl.textContent = '합성 중 오류: ' + err.message;
    statusEl.style.color = '#ff8080';
  }
}

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'life4cut_' + Date.now() + '.png';
  link.href = finalCanvas.toDataURL('image/png');
  link.click();
});

resetBtn.addEventListener('click', () => {
  allShots = [];
  selectedIdx = [];
  shots = [];
  decorations = [];
  armedSticker = null;
  renderStickerPalette();
  selectWrap.style.display = 'none';
  videoWrap.style.display = 'none';
  resultWrap.style.display = 'none';
  statusEl.textContent = '준비 완료! 촬영 시작을 눌러주세요.';
  statusEl.style.color = '#aaa';
});

startBtn.addEventListener('click', runSequence);

startCamera();
</script>
